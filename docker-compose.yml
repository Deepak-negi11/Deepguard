services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deepguard
      POSTGRES_USER: deepguard
      POSTGRES_PASSWORD: deepguard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    environment:
      DEEPGUARD_DATABASE_URL: postgresql+psycopg://deepguard:deepguard@db:5432/deepguard
      DEEPGUARD_CORS_ORIGINS: http://localhost:3000
      DEEPGUARD_REDIS_URL: redis://redis:6379/0
      DEEPGUARD_CELERY_BROKER_URL: redis://redis:6379/0
      DEEPGUARD_CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEEPGUARD_ENABLE_CELERY_WORKERS: "true"
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
      - ./uploads:/app/uploads
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: ./backend
    environment:
      DEEPGUARD_DATABASE_URL: postgresql+psycopg://deepguard:deepguard@db:5432/deepguard
      DEEPGUARD_CORS_ORIGINS: http://localhost:3000
      DEEPGUARD_REDIS_URL: redis://redis:6379/0
      DEEPGUARD_CELERY_BROKER_URL: redis://redis:6379/0
      DEEPGUARD_CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEEPGUARD_ENABLE_CELERY_WORKERS: "true"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
      - ./uploads:/app/uploads
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
